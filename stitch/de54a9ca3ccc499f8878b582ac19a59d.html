<style>
        body {
            background-color: #0B0E14;
            color: #e1e2eb;
            overflow: hidden;
        }

        /* The Void Background */
        .void-bg {
            position: absolute;
            inset: 0;
            background: #0B0E14;
            z-index: -3;
        }

        /* The Grid */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            pointer-events: none;
        }

        /* Blurred Gameplay Backdrop */
        .gameplay-blur {
            position: absolute;
            inset: 0;
            backdrop-filter: blur(20px);
            background-color: rgba(11, 14, 20, 0.6);
            z-index: -1;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.3);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        /* Neon Glow Button */
        .btn-neon {
            background-color: #00f2ff; /* primary-container */
            color: #002022; /* on-primary-fixed */
            transition: all 0.2s ease-in-out;
        }
        .btn-neon:hover {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.8);
            transform: scale(1.02);
        }
        .btn-neon:active {
            transform: scale(0.98);
        }

        /* Ghost Button */
        .btn-ghost {
            background: transparent;
            border: 1px solid #00f2ff;
            color: #00f2ff;
            transition: all 0.2s ease-in-out;
        }
        .btn-ghost:hover {
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3) inset;
        }

        /* Segmented Control */
        .segment-control input[type="radio"]:checked + label {
            background-color: rgba(0, 242, 255, 0.2);
            color: #74f5ff; /* primary-fixed */
            border-color: #00f2ff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2) inset;
        }

        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            background-color: #00f2ff;
            border-color: #00f2ff;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #00f2ff;
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
        .toggle-label {
            width: 44px;
            height: 24px;
            background-color: #3a494b; /* outline-variant */
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .toggle-label:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle-checkbox:focus + .toggle-label {
            box-shadow: 0 0 0 2px rgba(0, 242, 255, 0.5);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center font-body-md text-body-md relative">
<!-- Background Layers -->
<div class="void-bg"></div>
<div class="grid-bg"></div>
<!-- Simulated Gameplay Elements in Background (to show through blur) -->

<div class="absolute w-64 h-64 rounded-full border border-secondary-container/20 right-1/4 bottom-1/4 -z-20"></div>
<div class="gameplay-blur"></div>
<!-- Navigation Shell - TopAppBar (Small, Mobile context assumed based on "Lite") -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-hud-padding pt-hud-padding max-w-full bg-transparent no-border flat no shadows transition-transform scale-95 active:scale-90 md:hidden">
<div class="text-headline-lg-mobile font-headline-lg-mobile font-bold text-primary-fixed">ORBIT TAP LITE</div>
<div class="flex items-center space-x-4">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">pause</span>
</button>
</div>
</header>

<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Difficulty Section -->

</div>
</div>
</section>
<!-- Audio Section -->
<section class="flex flex-col gap-4">
<h2 class="font-label-caps text-label-caps text-on-surface-variant">AUDIO</h2>
<div class="flex items-center justify-between">
<div class="flex items-center gap-3 text-on-surface">

</div>
<div class="relative inline-block w-11 mr-2 align-middle select-none transition duration-200 ease-in">

<label class="toggle-label block overflow-hidden h-6 rounded-full cursor-pointer" for="sfx-toggle"></label>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-3 text-on-surface">
<span class="material-symbols-outlined text-on-surface-variant">graphic_eq</span>

</div>
<div class="relative inline-block w-11 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 opacity-0" id="music-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full cursor-pointer" for="music-toggle"></label>
</div>
</div>
</section>
<!-- Input Help Section -->
<section class="flex flex-col gap-3 pt-2 border-t border-outline-variant/30">
<h2 class="font-label-caps text-label-caps text-on-surface-variant">INPUT COMMANDS</h2>
<div class="grid grid-cols-2 gap-y-2 text-sm">

<div class="text-right text-primary-fixed font-mono bg-surface-container-high px-2 py-0.5 rounded text-xs inline-block w-fit ml-auto">R</div>
</div>
</section>
<!-- Actions -->

<button class="btn-neon w-full py-3 rounded-full font-bold text-center uppercase tracking-wider text-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
